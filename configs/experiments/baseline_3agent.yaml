# 参考实验配置（Baseline）
#
# 这是一个最简的端到端实验配置，用于验证平台可用性。
# 包含 3 个 agent（呼吸科、影像科、MDT 主持人），最简的串行拓扑。
#
# -------------------------------------------------------
# 这不是推荐的实验方案！只是一个 baseline。
# 后续研究中你应该根据实验设计创建新的配置文件。
# -------------------------------------------------------
#
# 注意：agent 的具体配置（model、temperature、prompt_template 等）
# 在各自的 .py 文件中管理（src/agents/ 下），YAML 只声明调用哪些 agent。

experiment:
  name: "baseline_3agent"
  description: "Baseline: 3-agent MDT (pulmonologist + radiologist + moderator), sequential pipeline"
  seed: 42

data:
  cases: "data/cases/demo_2cases.jsonl"
  ground_truth: "data/ground_truth/demo_2cases_labels.jsonl"

agents:
  - "pulmonologist"
  - "radiologist"
  - "moderator"

orchestration:
  strategy: "sequential_then_synthesize"
  parameters:
    specialists: ["pulmonologist", "radiologist"]
    synthesizer: "moderator"

communication:
  protocol: "blackboard"
  parameters: {}

conflict:
  detection:
    strategy: "none"
    parameters: {}
  arbitration:
    strategy: "none"
    parameters: {}

evaluation:
  metrics: []

tracking:
  save_full_traces: true
  save_token_usage: true
  cache_llm_responses: true
